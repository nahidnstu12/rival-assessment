name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: taskflow
          POSTGRES_PASSWORD: taskflow
          POSTGRES_DB: taskflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U taskflow -d taskflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://taskflow:taskflow@localhost:5432/taskflow
      JWT_SECRET: test-secret-min-32-chars-for-ci-testing
      NODE_ENV: test
      CLIENT_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Backend — install, migrate, test
        working-directory: backend
        run: |
          bun install
          bun run db:generate
          bun run db:deploy
          bun run test

      - name: Frontend — install, build, test
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:4000
        run: |
          bun install
          bun run build
          bun run test
